name: Approval Closure Control

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'scripts/v96-*.mjs'
      - 'release/v96/**'
      - 'docs/V96_APPROVAL_CLOSURE_CONTROL_PACK.md'
      - 'package.json'

jobs:
  approval-closure-control:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
      - run: node scripts/v96-install-package-scripts.mjs
      - run: npm run pilot:approval-closure-control
