name: Approval Execution Workspace

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'scripts/v95-*.mjs'
      - 'docs/**'
      - 'release/v95/**'
      - 'package.json'
      - '.github/workflows/approval-execution-workspace.yml'

jobs:
  approval-execution-workspace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: node scripts/v95-install-package-scripts.mjs
      - run: npm run pilot:approval-execution-workspace
