name: Live Staging Plan

on:
  push:
    branches:
      - main
      - 'v7.*'
  pull_request:
    branches:
      - main

jobs:
  live-staging-plan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Install v7.8 scripts
        run: node scripts/v78-install-package-scripts.mjs

      - name: Run live staging plan checks
        run: npm run pilot:live-staging-plan
