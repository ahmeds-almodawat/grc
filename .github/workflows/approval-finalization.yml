name: Approval Finalization

on:
  pull_request:
  workflow_dispatch:

jobs:
  approval-finalization:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: node scripts/v91-install-package-scripts.mjs
      - run: npm run pilot:approval-finalization
