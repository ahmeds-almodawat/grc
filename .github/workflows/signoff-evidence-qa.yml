name: Signoff Evidence QA

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'release/v674/approvals/**'
      - 'scripts/v92-*.mjs'
      - 'docs/**'
      - 'package.json'

jobs:
  signoff-evidence-qa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: node scripts/v92-install-package-scripts.mjs
      - run: npm run pilot:signoff-evidence-qa
